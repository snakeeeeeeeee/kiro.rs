services:
  kiro-rs:
    image: "${KIRO_RS_IMAGE:-ghcr.io/hank9999/kiro-rs:latest}"
    container_name: kiro-rs-prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${KIRO_RS_BIND:-127.0.0.1}:${KIRO_RS_PORT:-8990}:8990"
    volumes:
      - ./config/:/app/config/
    environment:
      RUST_LOG: "${RUST_LOG:-info}"
    restart: unless-stopped
    stop_grace_period: 75s
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8990/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "${KIRO_RS_CPU_LIMIT:-2.0}"
          memory: "${KIRO_RS_MEMORY_LIMIT:-1g}"
